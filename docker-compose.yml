version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: codenova_dev_pg
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-codenova_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    networks:
      - codenova_net

  redis:
    image: redis:7-alpine
    container_name: codenova_dev_redis
    ports:
      - "6379:6379"
    networks:
      - codenova_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: codenova_dev_backend
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-codenova_dev}
      - JWT_SECRET=${JWT_SECRET:-dev_secret}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis
    networks:
      - codenova_net
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: codenova_dev_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - codenova_net
    depends_on:
      - backend
    command: npm start

networks:
  codenova_net:
    driver: bridge

volumes:
  pgdata_dev:
