apiVersion: batch/v1
kind: Job
metadata:
  name: kibana-setup
  namespace: monitoring
spec:
  template:
    spec:
      containers:
      - name: setup
        image: curlimages/curl
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for Kibana..."
          while ! curl -s http://kibana:5601/api/status | grep -q 'available'; do sleep 5; done;
          echo "Kibana is up. Loading saved searches..."
          
          curl -X POST "http://kibana:5601/api/saved_objects/index-pattern/codenova-logs" -H 'kbn-xsrf: true' -H 'Content-Type: application/json' -d '{"attributes":{"title":"codenova-logs-*","timeFieldName":"@timestamp"}}'
          
          curl -X POST "http://kibana:5601/api/saved_objects/search/error-logs" -H 'kbn-xsrf: true' -H 'Content-Type: application/json' -d '{"attributes":{"title":"Error Logs","description":"","hits":0,"columns":["_source"],"sort":[["@timestamp","desc"]],"version":1,"kibanaSavedObjectMeta":{"searchSourceJSON":"{\\"query\\":{\\"query\\":\\"level: error\\",\\"language\\":\\"kuery\\"},\\"filter\\":[],\\"indexRefName\\":\\"kibanaSavedObjectMeta.searchSourceJSON.index\\"}"}},"references":[{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"codenova-logs"}]}'

          curl -X POST "http://kibana:5601/api/saved_objects/search/slow-executions" -H 'kbn-xsrf: true' -H 'Content-Type: application/json' -d '{"attributes":{"title":"Slow Executions (>5s)","description":"","hits":0,"columns":["_source"],"sort":[["@timestamp","desc"]],"version":1,"kibanaSavedObjectMeta":{"searchSourceJSON":"{\\"query\\":{\\"query\\":\\"executionTime > 5000\\",\\"language\\":\\"kuery\\"},\\"filter\\":[],\\"indexRefName\\":\\"kibanaSavedObjectMeta.searchSourceJSON.index\\"}"}},"references":[{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"codenova-logs"}]}'
          
          curl -X POST "http://kibana:5601/api/saved_objects/search/failed-submissions" -H 'kbn-xsrf: true' -H 'Content-Type: application/json' -d '{"attributes":{"title":"Failed Submissions","description":"","hits":0,"columns":["_source"],"sort":[["@timestamp","desc"]],"version":1,"kibanaSavedObjectMeta":{"searchSourceJSON":"{\\"query\\":{\\"query\\":\\"exitCode > 0\\",\\"language\\":\\"kuery\\"},\\"filter\\":[],\\"indexRefName\\":\\"kibanaSavedObjectMeta.searchSourceJSON.index\\"}"}},"references":[{"name":"kibanaSavedObjectMeta.searchSourceJSON.index","type":"index-pattern","id":"codenova-logs"}]}'

          echo "Saved objects loaded successfully!"
      restartPolicy: OnFailure
