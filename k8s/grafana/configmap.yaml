apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-service:9090
        access: proxy
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monitoring
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'Codenova Dashboards'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  system-overview.json: |
    {
      "title": "System Overview",
      "panels": [
        { "type": "graph", "title": "CPU Usage", "targets": [ { "expr": "sum(rate(container_cpu_usage_seconds_total[5m])) by (pod)" } ] },
        { "type": "graph", "title": "Memory Usage", "targets": [ { "expr": "sum(container_memory_usage_bytes) by (pod)" } ] }
      ]
    }
  api-performance.json: |
    {
      "title": "API Performance",
      "panels": [
        { "type": "graph", "title": "Request Rate", "targets": [ { "expr": "sum(rate(http_requests_total[5m]))" } ] },
        { "type": "graph", "title": "Error Rate", "targets": [ { "expr": "sum(rate(http_requests_total{status=~\"5..\"}[5m]))" } ] }
      ]
    }
  code-execution.json: |
    {
      "title": "Code Execution Metrics",
      "panels": [
        { "type": "graph", "title": "Executions / Min", "targets": [ { "expr": "rate(code_executions_total[1m])" } ] },
        { "type": "graph", "title": "Avg Execution Time by Lang", "targets": [ { "expr": "rate(code_execution_time_seconds_sum[5m]) / rate(code_execution_time_seconds_count[5m])" } ] }
      ]
    }
