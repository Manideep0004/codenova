version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: codenova_prod_pg
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - codenova_net

  redis:
    image: redis:7-alpine
    container_name: codenova_prod_redis
    networks:
      - codenova_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codenova_prod_backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis
    networks:
      - codenova_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codenova_prod_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - codenova_net

networks:
  codenova_net:
    driver: bridge
